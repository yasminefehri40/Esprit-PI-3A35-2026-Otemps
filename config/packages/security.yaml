security:
    password_hashers:
        App\Entity\Utilisateurs:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateurs
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: false
                default_target_path: app_after_login
                username_parameter: _username
                password_parameter: _password
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/face-login, roles: IS_AUTHENTICATED_ANONYMOUSLY }
when@test:
    security:
        password_hashers:
            App\Entity\Utilisateurs:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
